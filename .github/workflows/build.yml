name: APK Builder Bot

on:
  issues:
    types: [opened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # WAITING MESSAGE
      - name: Comment waiting
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "waiting"
            });

      # SETUP NODE
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # SETUP JAVA
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # INSTALL CORDOVA
      - name: Install Cordova
        run: npm install -g cordova

      # CREATE PROJECT
      - name: Create Cordova app
        run: cordova create app com.game.app GameApp

      - name: Add Android platform
        run: |
          cd app
          cordova platform add android

      # COPY GAME (you will later replace with ZIP download step)
      - name: Copy game
        run: |
          mkdir -p app/www
          cp -r www/* app/www/

      # BUILD APK
      - name: Build APK
        run: |
          cd app
          cordova build android

      # UPLOAD APK
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk

      # DONE MESSAGE
      - name: Comment done
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "done"
            });

      # CLOSE ISSUE
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

      # DELETE ISSUE (ADVANCED - MAY FAIL WITHOUT PERMISSIONS)
      - name: Delete issue (optional)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.request('DELETE /repos/{owner}/{repo}/issues/{issue_number}', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
