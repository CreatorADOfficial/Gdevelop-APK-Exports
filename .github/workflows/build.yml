name: APK Builder Bot

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # CHECK IF ZIP EXISTS
      # =========================
      - name: Check issue for ZIP
        id: check_zip
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body.toLowerCase();

            // simple check (GitHub issues don't expose attachments easily)
            const hasZip = body.includes(".zip");

            core.setOutput("has_zip", hasZip);

      # =========================
      # NO ZIP CASE
      # =========================
      - name: Ask for ZIP
        if: steps.check_zip.outputs.has_zip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "please send a zip file"
            });

      # Stop workflow if no ZIP
      - name: Stop if no ZIP
        if: steps.check_zip.outputs.has_zip != 'true'
        run: exit 0

      # =========================
      # ZIP EXISTS → START BUILD
      # =========================
      - name: Waiting message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "waiting"
            });

      # =========================
      # SETUP ENV
      # =========================
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Cordova
        run: npm install -g cordova

      # =========================
      # CREATE PROJECT
      # =========================
      - name: Create Cordova app
        run: cordova create app com.game.app GameApp

      - name: Add Android platform
        run: |
          cd app
          cordova platform add android

      # =========================
      # GAME FILES (PLACEHOLDER)
      # =========================
      - name: Prepare www folder
        run: |
          mkdir -p app/www
          cp -r www/* app/www/ || true

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        run: |
          cd app
          cordova build android

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk

      # =========================
      # DONE MESSAGE
      # =========================
      - name: Done message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "done"
            });
